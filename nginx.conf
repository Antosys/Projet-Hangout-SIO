server {
    listen 80;
    server_name antoinegiblin-projet-bts.com www.antoinegiblin-projet-bts.com;

    # Redirige tout le trafic HTTP vers HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name antoinegiblin-projet-bts.com www.antoinegiblin-projet-bts.com;

    ssl_certificate     /etc/letsencrypt/live/antoinegiblin-projet-bts.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/antoinegiblin-projet-bts.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Fichiers statiques du front React (build Vite)
    root /var/www/hangout/client/dist;
    index index.html;

    # SPA fallback : toute route inconnue → index.html (React Router gère côté client)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy vers l'API Node.js
    location /api/ {
        proxy_pass         http://127.0.0.1:3000/api/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Proxy vers les uploads
    location /uploads/ {
        proxy_pass         http://127.0.0.1:3000/uploads/;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
